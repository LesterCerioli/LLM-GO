model:
  model_type: small
  vocab_size: 32000
  max_seq_len: 2048
  d_model: 768
  n_heads: 12
  n_layers: 12
  d_ff: 3072
  dropout: 0.1
  attention_dropout: 0.1
  rope_theta: 10000.0
  tie_embeddings: true

training:
  learning_rate: 3.0e-4
  weight_decay: 0.1
  warmup_steps: 2000
  max_steps: 100000
  batch_size: 32
  gradient_accumulation_steps: 4
  mixed_precision: bfloat16
  lr_schedule: cosine
  min_lr_ratio: 0.1
  gradient_clip: 1.0
  save_every_n_steps: 1000
  eval_every_n_steps: 500
  log_every_n_steps: 50

data:
  processed_dir: data/processed
  tokenizer_dir: data/tokenizer
  vocab_size: 32000
